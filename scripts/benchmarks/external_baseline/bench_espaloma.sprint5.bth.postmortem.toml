# ---------------------------------------------------------------------------
# LESSONS
# ---------------------------------------------------------------------------
[lessons]

[[lessons.item]]
lesson = "conda-only deps require explicit environment friction accounting in §7.1"
detail = """
When a comparator requires conda/micromamba + complex dep chains (rdkit,
openff-toolkit, DGL channel), setup friction is itself a data point for the
portability claim. Document it quantitatively (hours of setup) in the paper
as supporting evidence, not as a footnote.
"""

[[lessons.item]]
lesson = "internal consistency check before reporting inter-tool comparisons"
detail = """
Before publishing prolix-vs-espaloma on Blackwell, check prolix-on-H200 vs
prolix-on-Blackwell. A 560× degradation within one tool across hardware
generations is a red flag that should have halted the analysis before
gate-exclusion decisions were made. Add this as a sanity gate to the
analysis script (bench_prolix results must be monotonically improving or
within 2× across hardware generations).
"""

[[lessons.item]]
lesson = "attribution of 'custom kernels' should be traceable to the package, not the dep chain"
detail = """
'espaloma uses custom CUDA kernels' was assumed without checking. The custom
kernels are DGL's (libdgl.so), not espaloma's. This distinction matters for
the paper: the claim is about DGL's SpMM vs XLA's GEMM, not espaloma's own
kernel engineering.
"""

[[lessons.item]]
lesson = "gate exclusion decisions made after seeing data are fragile under review"
detail = """
The decision to exclude espaloma was made on 2026-05-27, the same day the C3
smoke matrix ran and showed the Blackwell anomaly. Even if the rationale is
sound ('different graph representation'), the sequencing looks like post-hoc
gate narrowing. Pre-register gate conditions before running comparators, or
document the rationale with a mechanistic explanation that doesn't depend on
the outcome.
"""
