# bath sidecar for bench_dmff.py — Scope A sequential per-mol proxy
#
# Per-tool sidecar. Campaign-level design + comparator thresholds live in
# campaign_design.toml + research_notes.md.
#
# This sidecar's outcomes are PROCESS-level (does the harness emit valid data)
# because smoke-round thresholds are not yet anchored. After all comparators
# smoke at N=64, a separate confirmation-mode sidecar with empirical thresholds
# will be added (and this sidecar's hypothesis revisited).

[experiment]
hypothesis = """
Sequential per-mol JAX-bonded forward+backward at N=64 mols on RTX Pro 6000
Blackwell produces valid per_mol_step_seconds > 0 and final_loss > 0, confirming
real compute (no XLA dead-code fold). This establishes the no-heterogeneous-batching
baseline for §7.1 external-baseline comparison.

Unlike prolix's batched bundle (single vmap over all N mols), DMFF/sequential loop
processes mols one-at-a-time. The per_mol_step_seconds ratio (trial_seconds / N)
will be ~N× higher than prolix's because sequential-per-mol has no batching
amortization. This measured gap anchors the heterogeneous-batching speedup claim
in the §7.1 comparator table.
"""

[outcomes.pass]
condition = "per_mol_step_seconds > 0 AND final_loss > 0 AND final_loss < 1e10"
decision = "Smoke confirmed. Record T_d = per_mol_step_seconds for threshold-anchoring math in research_notes.md. Expect T_d >> T_prolix (N=64 sequential vs N=64 batched)."
reasoning = """
Pass = harness emits valid metrics:
  - per_mol_step_seconds > 0: sequential loop timing actually measured, not negative clock skew
  - final_loss > 0: real compute happened; non-zero loss confirms no XLA fold
    (exact failure mode caught in 2026-05-21 debugging)
  - final_loss < 1e10: not NaN/Inf, not runaway gradient

For sequential per-mol, expected T_d = (trial_seconds / N) where trial_seconds
is the wall-clock time for one forward+backward+update loop over all N mols.
At N=64 sequential (no batching), prolix internal sweep baseline of 55µs per-mol-step
should scale: DMFF sequential should be ~10-100× slower (single-threaded, no batch
amortization) → T_d range 550µs-5500µs, well above zero, well below 1e10.
"""

[outcomes.fail]
is_residual = true
condition = "per_mol_step_seconds IS NULL OR per_mol_step_seconds <= 0 OR final_loss IS NULL OR final_loss <= 0 OR final_loss >= 1e10"
decision = "Harness broken or computation suspect. Investigate before treating this row as a sequential baseline: zero/NaN loss → XLA fold or fixture bug; missing fields → script crash; runaway loss → gradient blow-up."
reasoning = """
Residual catch-all per bath gate requirements. Covers:
  - Script exit non-zero or output JSON malformed (fields IS NULL)
  - per_mol_step_seconds <= 0: negative clock skew, immediate exit, or invalid timing
  - final_loss <= 0: XLA constant-folded gradient (zero-by-construction fixture bug,
    exact pattern caught on 2026-05-21 before params-vmap was understood)
  - final_loss >= 1e10: NaN/Inf or runaway gradient (e.g., learning rate too high,
    or numerically unstable bonded energy computation)

Any of these → baseline cannot be established. Fix the harness, re-run.
"""

