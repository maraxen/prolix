[experiment]
hypothesis = """
H1 (prereg 260528_b1-preregistration): For a fixed ensemble of 64 heterogeneous
systems (4 topology classes × 16 replicas: 1ake, 1ubq, 2gb1, 4-water), prolix
cold-start t_total (median over ≥3 seeds) is lower than OpenMM’s equivalent
cold-start protocol with N independent Contexts (no Context reuse), in the
short-trajectory / init-bound regime (100 ps per system @ dt=0.5 fs).

H0: No statistically meaningful wall-clock advantage, or prolix advantage is
entirely explained by aot_ratio = t_aot_compile / t_total > 0.5
(compile-dominated artifact).
"""

[outcomes.pass]
condition = "t_total IS NOT NULL AND t_total > 0 AND finite_positions = true AND (backend = 'openmm' OR aot_ratio < 0.5)"
decision = "Keep / aggregate into campaign median. Finite wall-clock with AOT guard satisfied for prolix (or OpenMM baseline segment). Compare prolix vs openmm medians offline for H1."
reasoning = "Prereg success criteria: usable t_total plus AOT guard aot_ratio < 0.5 on prolix. OpenMM stubs aot_ratio=0 (N/A). Headline H1 comparison is cross-run (prolix median < openmm median), not a single-run pass."

[outcomes.fail]
condition = "t_total IS NULL OR t_total <= 0 OR finite_positions = false OR (backend = 'prolix' AND aot_ratio >= 0.5)"
decision = "Investigate crash, non-finite MD, missing timers, or AOT-dominated prolix cold-start (escalate R4 / AOT budget before Claim-1 headline)."
reasoning = "Any of these means the run did not produce a usable Claim-1 confirmation datum. Residual catches schema/parse failures too."
is_residual = true

