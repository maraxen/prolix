[experiment]
hypothesis = """
Phase 5 R-step fix (campaign ef45b8b4): implementing OpenMM-style R-step momentum
correction (dp = mass * (x_constrained - x_unconstrained) / (dt/2)) after each
SETTLE_pos call resolves liquid-density NVT energy injection. Both slow tests PASS:
- test_nvt_dilute_temperature_smoke: T in [150,450] K (8 waters, dilute grid)
- test_nvt_216water_temperature_stability: T = 300 +/- 5 K (895 waters, liquid density)
Pytest exit code = 0, n_passed = 2, n_xfailed = 0.
"""

[outcomes.pass]
condition = "gate_pass = 1 AND n_failed = 0 AND n_xfailed = 0"
decision = "Phase 5 R-step fix confirmed. Proceed to trajectory parity (P5-A2) and Phase 5 close (P5-C0)."
reasoning = "Both tests pass with no xfails — R-step dp correction resolves the energy injection seen at liquid density."
is_residual = false

[outcomes.marginal]
condition = "gate_pass = 1 AND n_xfailed = 1 AND n_failed = 0"
decision = "Code push incomplete — xfail still present on cluster. Re-push tests/ and clear .pyc cache, resubmit."
reasoning = "gate_pass=1 with n_xfailed=1 means old test file is running on cluster. Check sync."
is_residual = false

[outcomes.fail]
condition = "gate_pass = 0 OR n_failed > 0"
decision = "R-step fix insufficient or incorrectly implemented. Pull T trajectory and check if energy injects from R1 or R2 step."
reasoning = "Catch-all: liquid-density test fails or gate exits non-zero."
is_residual = true

[result_schema]
gate_pass = "int"
n_passed = "int"
n_xfailed = "int"
n_failed = "int"
exit_code = "int"
