[experiment]
hypothesis = """
The HP4 16-molecule Lane A ensemble converges bonded force-field parameters
under Phase C's training loop (force MSE + α·energy MSE + harmonic prior) over
500 Adam steps. The looped and batched paths are computationally equivalent
within float32 numerical noise (Phase C v3 correctness gate cleared at
rtol=1e-3). Float64 should produce a similar loss trajectory at higher
precision cost on the accelerator. This experiment characterizes the 4-way
matrix {looped,batched} × {float32,float64} for the §7.1 paper figure.
"""

[outcomes.pass]
condition = "COALESCE(looped_final_loss_max, batched_final_loss_max) IS NOT NULL AND COALESCE(looped_final_loss_max, batched_final_loss_max) < 1e10 AND wallclock_s > 0"
decision = "Proceed to Phase D rendering. The run produced finite per-mol final losses within a reasonable upper bound; cluster pipeline + bath ingest worked end-to-end. Cross-cell comparison (looped vs batched, f32 vs f64) happens via bth campaign review."
reasoning = "We don't yet have a calibrated 'good' loss threshold — initial 3-step smoke gave ~450k loss with the geometry-init params. After 500 steps the loss should be much lower but the absolute magnitude is workload-dependent. The 1e10 cap catches NaN/Inf or runaway gradients; everything else is a 'completed' run whose interpretation lives in the cross-cell aggregation."

[outcomes.fail]
condition = "COALESCE(looped_final_loss_max, batched_final_loss_max) IS NULL OR COALESCE(looped_final_loss_max, batched_final_loss_max) >= 1e10 OR wallclock_s IS NULL OR wallclock_s <= 0"
decision = "Investigate: (a) NaN/Inf in the loss (gradient blow-up — check learning rate, harmonic prior σ); (b) wallclock not recorded (script crashed before timer); (c) data path missing (script exited before training). Inspect the bth run log and the stdout/stderr file."
reasoning = "Any of these conditions means the run did not produce usable §7.1 figure data. The is_residual=true catches everything not explicitly passing."
is_residual = true

