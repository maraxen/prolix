[experiment]
hypothesis = """
Phase 4 Step 3a/3b (task 260715_b1_physics_parity): after fixing the PME-
reciprocal-silently-disabled bug (commit 395995b), does XLA hoist the PME
Green's-function/B-spline-modulus setup (named_scope "pme_greens_setup",
step- and replica-invariant, depends only on box_size/alpha/order) out of
the compiled while_loop body, or does it get recomputed every one of the
~200k real production steps? And does a real device trace of the water-class
program (16 replicas, real PME now executing for the first time) show the
grid-oversizing/scatter-gather cost structure predicted by static code
reading -- specifically the order^3=64-iteration Python-unrolled scatter
loop in spread_charges touching a 64x64x64 grid for only 12 real atoms?

--hlo-only (CPU, free) answers the hoisting question directly via HLO text
structure. --trace (GPU required) captures a Perfetto trace with named_scope
labels visible as regions, for the second question.
"""

[outcomes.pass]
condition = "n_while_bodies_found IS NOT NULL AND n_while_bodies_found > 0"
decision = "HLO structure was successfully parsed; named_scope findings (and, if --trace, the Perfetto trace) are trustworthy inputs to the Phase 4 synthesis doc."
reasoning = "At least one while-loop body computation must be found for the hoisted-vs-recomputed classification to mean anything -- zero while bodies found would mean the block-boundary parser itself failed silently, not that nothing is looping."

[outcomes.fail]
condition = "n_while_bodies_found IS NULL OR n_while_bodies_found = 0"
decision = "Investigate: either the reconstructed dispatch closure (_build_batched_callable) doesn't match the real EnsemblePlan._run_stacked_dispatch structure at this n_steps/replicas scale (re-verify against the real code, or against plan._run_stacked_dispatch's own output directly), or the HLO block-parsing regex needs adjustment for this XLA version's pretty-printer output."
reasoning = "Structural HLO analysis is worthless if the block-boundary parser can't even find the while loop it's trying to classify contents of -- a silent parser failure would masquerade as a clean 'not found' verdict for every named_scope label, which is exactly the false-negative failure mode already observed once at toy scale (2 replicas, 5 steps) before this sidecar existed."
is_residual = true

[result_schema]
mode = "str"
n_steps = "int"
replicas = "int"
n_while_bodies_found = "int"
n_blocks_found = "int"
n_trials = "int"

