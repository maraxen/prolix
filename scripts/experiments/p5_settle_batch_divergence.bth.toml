[experiment]
hypothesis = "Batched SETTLE divergence is caused by FMA-sensitive PBC minimum-image rounding in _settle_water_batch (platform_precision): `delta - box * round(delta/box)` at settle.py:237 can select the wrong periodic image on GPU XLA paths, displacing constrained positions by one full box-length relative to the CPU/unbatched reference."

[outcomes.pass]
condition   = "max_diff_with_box < 1e-5"
decision    = "platform_precision root cause confirmed — divergence is below 1e-5 Å on CPU; cluster GPU run required to observe the ULP flip"
reasoning   = "On CPU float64, FMA is not enabled so round() is exact; max_diff < 1e-5 means the box unwrap is numerically stable here and the bug only manifests on GPU"

[outcomes.fail]
condition   = "max_diff_with_box >= 1e-5"
decision    = "divergence reproduces on CPU; investigate alternative root cause (rng_key_threading or non-PBC path)"
reasoning   = "If CPU already diverges, the FMA-ULP hypothesis is not the only cause; need to check key threading or other batch-asymmetric paths"
is_residual = true

[result_schema]
batch_size            = "int"
n_waters              = "int"
box_size              = "float"
steps                 = "int"
max_diff_with_box     = "float"
max_diff_free_space   = "float"

