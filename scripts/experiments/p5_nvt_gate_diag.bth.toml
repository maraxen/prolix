[experiment]
hypothesis = """
B1 fix (commit 485f754): replacing the 6×6 G-matrix Cholesky in _ou_noise_one_water_rigid
with explicit 3+3 trans/rot block decomposition eliminates numerical cross-mode coupling
and brings mean NVT T within 300±5 K for 895-water TIP3P.

Prior diagnostic (run c3206007, campaign 933024dc) showed:
  mean T = 294.80 ± 1.08 K over 5 seeds (target 300 K, error 5.20 K)
  T_trans = 305.9 K, T_rot = 281.7 K (+/-23 K imbalance)

Expected outcome after B1 fix:
  T_trans ≈ T_rot ≈ 300 K (within ±5 K each)
  mean T within 300±5 K → gate_pass = 1
"""

[outcomes.pass]
condition = "gate_pass = 1"
decision = "B1 fix confirmed. Gate passes. Close Phase 5 / Phase D Certify. Merge worktree to main."
reasoning = "Mean T over 5 seeds within 300±5 K confirms the trans+rot block decomposition gives correct equipartition."
is_residual = false

[outcomes.fail]
condition = "gate_pass = 0"
decision = "B1 fix insufficient. Inspect T_trans and T_rot values from q2_decomp; if imbalance persists, deeper investigation needed (SETTLE_vel impulse coupling, c1/c2 scaling, or DOF counting error)."
reasoning = "Persistent gate failure after explicit block decomposition means a different mechanism is active."
is_residual = true

