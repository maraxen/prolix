# ── Key API facts for next session (source-verified from /tmp repos) ──────────
#
# DMFF (/tmp/dmff-repo@809f656):
#   Hamiltonian(*xml_files)  # NonbondedForce section optional — prints warning, no throw
#   pot = h.createPotential(topo, nonbondedMethod=app.NoCutoff)
#   pairs = NoCutoffNeighborList(cov_map=pot.meta['cov_map']).allocate(positions)
#     # pairs shape (N,3) — third column is bond order, MANDATORY
#   efunc = pot.getPotentialFunc()  # efunc(pos[natoms,3], box[3,3], pairs[N,3], prms)
#   params = h.getParameters()      # ParamSet pytree
#     params['HarmonicBondForce']['k']       # kJ/mol/nm²
#     params['HarmonicBondForce']['length']  # nm
#     params['HarmonicAngleForce']['k']      # kJ/mol/rad² (key 'angle' for eq — VERIFY)
#   loss = sum_i efunc_i(pos_i, box, pairs_i, params)
#   val, grads = jax.value_and_grad(loss)(params)  # then optax step
#   Unit conversions (AKMA → OpenMM):
#     r0_nm = r0_Å * 0.1
#     k_kJ_nm2 = k_kcal_A2 * 4.184 * 100 * 2   # half-spring convention
#     angle_rad = theta0_deg * π/180
#     k_kJ_rad2 = k_theta_kcal_rad2 * 4.184 * 2
#     k_tors_kJ = k_phi_kcal * 4.184
#
# TorchMD (/tmp/torchmd-repo@0948418, PyPI torchmd>=1.1.2):
#   Strictly file-based Parameters (no raw-array constructor)
#   YamlForcefield(mol, yaml_path) — YAML format:
#     bonds: (AT1, AT2): {k0: <kcal/mol/Å²>, req: <Å>}   ← same units as prolix JSON
#     angles: (AT1, AT2, AT3): {k0: <kcal/mol/rad²>, theta0: <degrees>}
#   Forces(parameters, terms=['bonds','angles','dihedrals'])
#   forces.compute(pos[nreplicas,natoms,3], box, system.forces)  # loop at L104-320
#   No cross-topology batching. torch.vmap = same topology only.
#
# espaloma (/tmp/espaloma-repo@413eb55):
#   EnergyInGraph node feature keys (energy.py:18-19):
#     n2 (bonds):    'k' [force const], 'eq' [equil distance, Å]
#     n3 (angles):   'k', 'eq' [radians]
#     n4 (torsions): 'k', 'phases', 'periodicity'
#   GeometryInGraph: reads 'xyz' from n1 → writes 'x' to n2/n3/n4
#   Graph construction requires openff-toolkit (no workaround)
#   dgl.batch works for N-mol batching (NOT used in espaloma codebase but valid)
#   energy in g.nodes['g'].data['u'], then loss.backward()
#
# Unified XML input:
#   _generate_xml.py: prolix JSON → OpenMM XML per molecule
#   bench_prolix.py: add --xml-dir flag (parses XML → internal repr)
#   bench_dmff.py: feeds XML directly to Hamiltonian
#   bench_torchmd.py: XML → YAML (unit-passthrough for bonds/angles)
#   bench_espaloma.py: XML → DGL heterograph via openff-toolkit

