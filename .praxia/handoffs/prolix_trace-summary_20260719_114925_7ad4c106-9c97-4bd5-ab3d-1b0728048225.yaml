  summary: "This segment involved a significant push to finalize the neighbor-list engine integration. First, the agent implemented the core logic for `use_neighbor_list=True` in `EnsemblePlan.run`, which included handling neighbor list updates, ghost atom pinning (to prevent them from drifting off the lattice), and an overflow-and-reallocate path. During this process, a critical bug was discovered where `chunked_lj_energy_nl` and `chunked_coulomb_energy_nl` incorrectly marked the neighbor index as a non-differentiable argument in `custom_vjp`, which broke the requirement for the neighbor list to vary within a jitted loop. This was fixed by adjusting the `nondiff_argnums`. \n\nAfter verifying the NL path with multi-step runs and confirming ghost atom stability, the agent moved to verification. It wrote a new OpenMM parity test for the Bundle/NL path. While local execution of this heavy test was killed by the system's compute limits (exit code 143), the agent verified all components independently and submitted the test for nightly CI. Finally, the agent performed a local dry-run of the compile-sharing check (confirming 1VII and 2GB1 still share a bucket) and submitted the full verification job to the cluster (job 18304424)."
