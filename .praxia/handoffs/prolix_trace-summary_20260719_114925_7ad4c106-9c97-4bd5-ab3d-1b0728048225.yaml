  summary: The agent documented a new `XR-WHILE-CARRY` strategy in `xtrax` to address the abstraction gap for `lax.while_loop` in inference. During the final verification of Debt 760, a cluster job failure revealed that while NL inference works for single-bundle runs, it was never wired into the vmapped multi-bundle dispatch path. This meant the core goal of Step 7 (verifying cross-protein compile-sharing) could not be tested as the code path didn't exist. The agent updated the profiling script to fail loudly on this mismatch, filed Debt 802 (multi-bundle NL extension) and Debt 803 (cluster sync issue), and updated the project's decision docs and memory.
- phase: trace_segment
  task_id: 260719_prolix_nl_pme_ensemble_trace
  summary: The agent addressed a fundamental incompatibility where 'neighbor_fn.allocate()' is a host-only operation and cannot be called inside a vmapped/traced function. To solve this, the agent identified a strategy to allocate a 'seed' NeighborList on the host once and then use '.update()' per bundle. Since '.update()' preserves the static metadata of the seed, the resulting NeighborLists for different bundles become stackable as a pytree. The agent implemented this by updating 'dispatch_n_mols' to accept 'extra_stacked' arguments, modifying '_run_single_inference' to accept pre-allocated neighbors and surface overflows via observables, and creating helper methods to build and reallocate these stacked neighbor seeds. Finally, the agent fixed a secondary issue where 'excl_indices' were being incorrectly marked as non-differentiable in the stacked path, updating the 'custom_vjp' definitions for both LJ and Coulomb energy kernels.
