- phase: trace_segment
  task_id: 260719_prolix_nl_pme_ensemble_trace
  summary: 'This segment provides a comprehensive status update and scoping for the ''B1 Physics Parity'' plan. It summarizes the completion of Phases 1-3, which confirmed that prolix is significantly slower than OpenMM under genuine physics parity (~7.28x slower). Phase 4 was redirected because the initial profiling identified 1AKE (vacuum/GB) as the cost outlier rather than water/PME, which was orthogonal to the core thesis. Instead, the user redirected the focus to confirm the core thesis: that EnsemblePlan successfully shares a single compiled program across different solvated proteins (1VII+2GB1), which was empirically confirmed. The segment then details the scoping of Debt 760 (connecting the NL+PME engine from simulate.py) and Debt 761 (connecting analytical/flash forces). It identifies that while the necessary engines exist, they were never wired into EnsemblePlan. The scoping includes a design for a hand-rolled carry extension for the lax.while_loop, a plan to handle NeighborList capacity vs. shape buckets, and a recommendation to benchmark flash forces before committing to their integration. Finally, it scopes a long-term upstream goal (Phase 6a) to introduce a ''WhileCarry'' strategy to the xtrax library to close the abstraction gap between lax.scan and lax.while_loop.'
- phase: trace_segment
  task_id: 260719_prolix_nl_pme_ensemble_trace
  summary: The segment covers a series of technical improvements and bug fixes related to the Neighbor List (NL) and energy calculations. Key actions included fixing a `cutoff_distance` kwarg absorption bug in `system.py`, implementing the `compute_nl_capacity` formula in `neighbor_list.py`, and introducing a new damped-direct-space Coulomb-over-neighbors term. The agent also extended the `_setup_integrator/step_fn` to handle periodic NL updates and ghost-position pinning. A significant portion of the segment was dedicated to designing a new OpenMM PME-over-NL parity test to ensure consistency with existing benchmarks. Towards the end, the agent performed a deep dive into a discrepancy between LJ and Coulomb energy kernels, identifying a likely root cause involving spatial cutoffs in the dense reference versus the NL path.
- phase: trace_segment
  task_id: 260719_prolix_nl_pme_ensemble_trace
  summary: 'The agent performed a deep dive into a 75% discrepancy in Coulomb energy between dense and NL paths. Through systematic decomposition of the energy terms, it was discovered that the NL kernels were actually correct and matched ground truth. The root cause was identified as a double-counting of the PME exclusion correction: the dense path used an incomplete formula requiring a subsequent correction, while the NL path used a self-contained formula. Because the correction was applied unconditionally in the wiring, it was applied twice to the NL path. The agent implemented a fix by introducing a boolean flag `direct_space_includes_exclusion_correction` to skip the redundant correction when the NL path is used. The fix was verified with a new regression test, and the documentation was updated to reflect the correct root cause.'
- phase: trace_segment
  task_id: 260719_prolix_nl_pme_ensemble_trace
