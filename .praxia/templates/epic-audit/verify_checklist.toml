# Epic-audit VERIFY checklist — copy per inter-epic run into project .praxia/templates/epic-audit/

[audit]
closed_epic_id = 0
next_epic_id = 0
task_id = ""

[[checks]]
id = "ci_green"
description = "Default test suite passes"
command = ""  # fill from loop_priorities.toml [invariants].default_ci
required = true

[[checks]]
id = "research_memo"
description = "Closeout research memo exists with cited evidence"
path = ".praxia/docs/research/YYMMDD_<slug>-epic-closeout-audit.md"
required = true

[[checks]]
id = "loop_priorities"
description = "loop_priorities.toml reflects closed epic and next active epic"
path = ".praxia/loop_priorities.toml"
required = false
