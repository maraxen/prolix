## What needs to be added (Claim 3 surface)

### 1. `EnsemblePlan.from_bundles(cls, bundles, planner=None)` classmethod
A classmethod constructor that wraps the existing __init__. Identical semantics,
but follows the standard "factory on plural input" naming convention.

```python
@classmethod
def from_bundles(cls, bundles: list[Any], planner: Any = None) -> "EnsemblePlan":
    return cls(bundles, planner)
```

### 2. `EnsemblePlan.from_bundle(cls, bundle, planner=None)` classmethod
Convenience constructor for the common single-bundle case.

```python
@classmethod
def from_bundle(cls, bundle: Any, planner: Any = None) -> "EnsemblePlan":
    return cls([bundle], planner)
```

### 3. Verify `.run()` works end-to-end with the above constructors
Read `src/prolix/api/ensemble_plan.py` fully to understand what `.run()` does
(it uses settle_langevin with a dummy zero energy function). The implementation
must actually run without error on a minimal MolecularBundle-like object.

### 4. Write tests: tests/api/test_ensemble_plan.py
Create a test file that covers:

```python
import pytest
from unittest.mock import MagicMock
from prolix.api.ensemble_plan import EnsemblePlan

def _mock_bundle(n_atoms=3, n_waters=1):
    \"\"\"Minimal mock bundle for unit testing EnsemblePlan.\"\"\"
    bundle = MagicMock()
    bundle.n_atoms = n_atoms
    bundle.n_waters = n_waters
    bundle.positions = jnp.zeros((n_atoms, 3))
    bundle.water_indices = jnp.array([[0, 1, 2]])
    return bundle


def test_from_bundle_creates_single_bundle_plan():
    \"\"\"from_bundle(b) should set self.bundles = [b].\"\"\"
    b = _mock_bundle()
    ep = EnsemblePlan.from_bundle(b)
    assert ep.bundles == [b]
    assert ep.batch_plan is None


def test_from_bundles_creates_multi_bundle_plan():
    b1, b2 = _mock_bundle(), _mock_bundle()
    ep = EnsemblePlan.from_bundles([b1, b2])
    assert ep.bundles == [b1, b2]
    assert ep.batch_plan is None


def test_from_bundles_with_planner_calls_plan():
    b = _mock_bundle()
    planner = MagicMock()
    planner.plan.return_value = "mock_plan"
    ep = EnsemblePlan.from_bundles([b], planner=planner)
    planner.plan.assert_called_once_with([b])
    assert ep.batch_plan == "mock_plan"


def test_empty_bundles_raises():
    ep = EnsemblePlan([])
    with pytest.raises(ValueError, match="at least one bundle"):
        ep.run(n_steps=1, dt=0.5, kT=2.479e-3)


def test_multi_bundle_raises_not_implemented():
    b1, b2 = _mock_bundle(), _mock_bundle()
    ep = EnsemblePlan.from_bundles([b1, b2])
    with pytest.raises(NotImplementedError, match="Multi-bundle"):
        ep.run(n_steps=1, dt=0.5, kT=2.479e-3)
```

Note: Do NOT write a test that actually runs the full MD simulation (settle_langevin
requires JAX and real physics). The unit tests above mock the bundle and just test
