class TestB1Smoke:
    def test_b1_smoke_b4_wall_clock(self):
        '''B1-smoke: 4 varied-size bundles, 10 steps, wall-clock logged.'''
        # B=4 bundles with varied atom counts (5, 10, 20, 35 atoms)
        # Simulates hetero-batch: varied N tests BatchPlanner vmap/safe_map decisions
        bundles = [_make_bundle(n) for n in (5, 10, 20, 35)]

