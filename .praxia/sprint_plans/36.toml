  x_unc[1] = [3.0, 0.1, 0.1]   # H1 straddling PBC (x=3.0, box=3.1)
  x_unc[2] = [0.1, 0.3, 0.1]   # H2 within box
  box = jnp.array([3.1, 3.1, 3.1])
