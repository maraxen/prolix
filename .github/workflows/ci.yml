name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      
      - name: Lint with ruff
        run: |
          uv run ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      
      - name: Install dependencies
        run: |
          uv sync --extra dev
      
      - name: Type check with ty
        run: |
          uv run ty check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          uv sync --extra dev

      - name: REGRESSION_EXPLICIT_PME docs export is in sync
        run: |
          uv run python scripts/export_regression_pme.py --check
      
      # Skip slow, integration (OpenMM-dependent), and dynamics tests in CI
      - name: Run tests
        run: |
          uv run pytest -m "not (slow or integration or dynamics)" -v --cov=prolix --cov-report=xml
      
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
